<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook-log in or sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="text">
        <img src="image/fb logo.png" alt="">
        <p class="p1">Facebook helps you connect and </p>
        <p class="p2">share with the people in your life.</p>
    </div>
    <div class="login">
        <input type="text" placeholder="Email address or phone number"><br>
        <input type="password" placeholder="Password"><br><br>
        <button class="log_in">Log in</button><br><br>
        <div class="line">
            <a href="">Forgotten password?</a>
        </div><br>
        <button class="create_acc">Create new account</button>
    </div>
    <div class="create_page">
    <p class="cr_page">Create a Page </p>
    <p class="t">for a celebrity, brand or business.</p>
    </div>
</body>
</html>
